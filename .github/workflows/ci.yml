name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Lint (ruff check)
        run: ruff check .

      - name: Format check (ruff format --check)
        run: ruff format --check .

      - name: Type check (mypy --strict on src/ and tests/)
        run: mypy

      - name: Test (pytest with coverage)
        run: pytest --cov=nist_agent_passport --cov-report=term-missing

      - name: Dependency vulnerability scan (pip-audit)
        # Fail the build on any known-vulnerable dependency. `pip-audit`
        # queries the OSV.dev database; default behavior exits non-zero on
        # found vulnerabilities. `--skip-editable` excludes our own editable
        # install from the audit (it isn't on PyPI yet by definition).
        # We intentionally do NOT use --strict, which would also fail on
        # the editable-skip "warning" we just opted into.
        run: |
          pip install pip-audit
          pip-audit --skip-editable
